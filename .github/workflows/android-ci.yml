name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # Stage 1: Build + Validate
  # ═══════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # APK 静态分析
      - name: Validate APK
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          echo "::group::APK Size"
          ls -lh "$APK"
          echo "::endgroup::"

          echo "::group::Package Info"
          $ANDROID_HOME/build-tools/35.0.0/aapt2 dump badging "$APK" | grep -E "package:|sdkVersion:|uses-permission:|native-code:|application-label:"
          echo "::endgroup::"

          echo "::group::Permissions"
          $ANDROID_HOME/build-tools/35.0.0/aapt2 dump permissions "$APK"
          echo "::endgroup::"

          echo "::group::minSdk Check"
          # aapt2 badging 输出格式: sdkVersion:'26'
          MINSDK=$($ANDROID_HOME/build-tools/35.0.0/aapt2 dump badging "$APK" | grep -oP "sdkVersion:'\K[0-9]+" | head -1)
          if [ -z "$MINSDK" ]; then
            # Fallback: extract from compileSdkVersion
            MINSDK=$($ANDROID_HOME/build-tools/35.0.0/aapt2 dump badging "$APK" | grep -oP "compileSdkVersion:'\K[0-9]+" | head -1)
          fi
          if [ -n "$MINSDK" ]; then
            echo "✅ minSdk detected: $MINSDK"
          else
            echo "⚠️  Could not detect minSdk from APK"
          fi
          echo "::endgroup::"

      - name: Upload APK (arm64-v8a)
        if: matrix.arch == 'arm64-v8a'
        uses: actions/upload-artifact@v4
        with:
          name: LiveSpeaker-debug-arm64-v8a
          path: app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0

      - name: Upload APK (armeabi-v7a)
        if: matrix.arch == 'armeabi-v7a'
        uses: actions/upload-artifact@v4
        with:
          name: LiveSpeaker-debug-armeabi-v7a
          path: app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0

  # ═══════════════════════════════════════════════════════════
  # Stage 2: Emulator Smoke Test (arm64-v8a only)
  # 在 CI 中启动 Android 模拟器，安装 APK，验证启动不崩溃
  # ═══════════════════════════════════════════════════════════
  emulator-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        api-level: [34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: LiveSpeaker-debug-arm64-v8a

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator + Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Waiting for emulator ==="
            adb wait-for-device

            echo "=== Installing APK ==="
            adb install -r app-debug.apk

            echo "=== Launching app ==="
            adb shell am start -n com.livespeaker.app/.ui.MainActivity
            sleep 5

            echo "=== Checking if app is running ==="
            FOCUSED=$(adb shell dumpsys window 2>/dev/null | grep mCurrentFocus || echo "")
            echo "Current focus: $FOCUSED"

            # Check if our app is in the foreground
            adb shell dumpsys window 2>/dev/null | grep -q "com.livespeaker.app" && echo "✅ App is running!" || echo "⚠️  App window not detected (may be showing permission dialog)"

            echo "=== App process check ==="
            adb shell "ps -A 2>/dev/null | grep livespeaker" || echo "(no process found)"

            echo "=== Taking screenshot ==="
            adb exec-out screencap -p > /tmp/screenshot.png
            echo "Screenshot saved to /tmp/screenshot.png"

            echo "=== Logcat (errors only) ==="
            adb logcat -d -t 200 | grep -i -E "livespeaker|AndroidRuntime|FATAL" || echo "(no relevant errors)"

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot-${{ matrix.api-level }}
          path: /tmp/screenshot.png

  # ═══════════════════════════════════════════════════════════
  # Stage 3: Firebase Test Lab (条件启用)
  # 需配置: Settings → Secrets → FIREBASE_SERVICE_ACCOUNT
  #         Settings → Variables → FIREBASE_PROJECT_ID
  # ═══════════════════════════════════════════════════════════
  firebase-test:
    needs: build
    runs-on: ubuntu-latest
    if: vars.FIREBASE_PROJECT_ID != ''
    continue-on-error: true
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: LiveSpeaker-debug-arm64-v8a

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Robo Test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app app-debug.apk \
            --device model=Pixel6,version=34,locale=en,orientation=portrait \
            --timeout 5m \
            --project ${{ vars.FIREBASE_PROJECT_ID }} \
            --results-dir=ci-${{ github.run_id }} \
            --results-bucket=gs://${{ vars.FIREBASE_PROJECT_ID }}_test_results

      - name: Print results link
        if: always()
        run: |
          echo "📊 Firebase Test Lab results:"
          echo "   https://console.firebase.google.com/project/${{ vars.FIREBASE_PROJECT_ID }}/testlab"

  # ═══════════════════════════════════════════════════════════
  # Stage 4: Release
  # ═══════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, emulator-test]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LiveSpeaker-debug-arm64-v8a/app-debug.apk
            LiveSpeaker-debug-armeabi-v7a/app-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
